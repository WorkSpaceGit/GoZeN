<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Ґо</title>
<meta name="theme-color" content="#1f1f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ґо">
<link id="manifest-link" rel="manifest" href="#">
<link id="apple-touch" rel="apple-touch-icon" href="#">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%231f1f1e'/><circle cx='32' cy='32' r='14' fill='%23dcb35c'/><circle cx='32' cy='32' r='8' fill='%231f1f1e'/></svg>">
<style>
/* ── Reset & base ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;background:#1f1f1e}
body{
  height:100%;min-height:100vh;min-height:100dvh;
  background:#1f1f1e;color:#d4d4d0;
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
  font-size:14px;line-height:1.4;
  user-select:none;-webkit-user-select:none;
  touch-action:manipulation;overflow:hidden;
}

/* ── Layout root ── */
#root{
  display:flex;width:100%;height:100%;height:100dvh;
  flex-direction:column;
  background:#1f1f1e;
}
#root.landscape{flex-direction:row}

/* ── Board side ── */
#board-side{
  flex:1;min-width:0;min-height:0;
  display:flex;align-items:center;justify-content:center;
  background:#1f1f1e;
  padding:10px 10px 50px 10px; /* portrait default: bottom clears zen-btn */
}
#root.landscape #board-side{
  padding:10px;
}
#root.zen #board-side{
  padding:0;
  flex:1;
}

/* ── Canvas wrapper (square) ── */
#board-wrap{
  position:relative;
  /* fill available space as a square */
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
}

#go-canvas{
  display:block;
  cursor:crosshair;touch-action:none;border-radius:6px;
  /* actual size set by JS */
}

/* ── Info panel ── */
#info-panel{
  background:#181817;
  display:flex;flex-direction:column;gap:0;
  overflow:hidden;
  /* portrait: fixed height at bottom */
  height:45vh;min-height:200px;max-height:340px;
  flex-shrink:0;
  border-top:1px solid #333331;
}
#root.landscape #info-panel{
  width:46vw;max-width:420px;height:100%;
  max-height:none;min-height:0;
  border-top:none;border-left:1px solid #333331;
}
#root.zen #info-panel{display:none}

/* ── Game controls — між score і history ── */
#ctrl-bar{
  display:flex;align-items:center;gap:6px;
  padding:8px 12px;
  border-top:1px solid #333331;
  border-bottom:1px solid #333331;
  flex-shrink:0;
}
.ctrl-btn{
  background:transparent;color:#c8c8c4;
  border:1px solid #333;border-radius:5px;
  padding:6px 12px;font-size:13px;
  cursor:pointer;transition:border-color .15s,color .15s;outline:none;
  font-family:inherit;flex-shrink:0;
}
.ctrl-btn:active{border-color:#555}
.ctrl-btn:disabled{opacity:.25;cursor:default}
.ctrl-btn.accent{color:#dcb35c;border-color:#dcb35c}

/* ── Board size selector ── */
#size-bar{
  display:flex;align-items:center;gap:5px;flex-wrap:nowrap;
  padding:6px 12px;border-bottom:1px solid #333331;
  flex-shrink:0;
}
.size-btn{
  background:transparent;color:#666;
  border:1px solid transparent;border-radius:4px;
  padding:4px 10px;font-size:12px;
  cursor:pointer;transition:color .15s,border-color .15s;outline:none;
  font-family:inherit;white-space:nowrap;
}
.size-btn.active{color:#dcb35c;border-color:#dcb35c}

/* Комі inline — flex-shrink:0 prevents squishing */
#komi-wrap{
  margin-left:auto;display:flex;align-items:center;gap:4px;
  color:#6a6a68;font-size:11px;flex-shrink:0;
}
#komi-input{
  width:40px;background:transparent;color:#d4d4d0;
  border:1px solid #333;border-radius:4px;
  padding:3px 4px;font-size:12px;text-align:center;
  font-family:inherit;outline:none;-moz-appearance:textfield;
  appearance:textfield;
}
#komi-input::-webkit-inner-spin-button,
#komi-input::-webkit-outer-spin-button{-webkit-appearance:none}
#komi-input:focus{border-color:#555}

/* ── Marking controls (всередині score-block → точне вирівнювання) ── */
.sc-mc-label{
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 0 3px;
}
.sc-mc-cell{
  display:flex;align-items:center;justify-content:center;
  padding-bottom:3px;
}
.sc-mc-back{
  grid-column:1/-1;
  display:flex;justify-content:flex-end;
  padding:4px 0 2px;
}
.sc-mk-btn{
  background:transparent;color:#666;
  border:1px solid #3a3a38;border-radius:3px;
  padding:3px 8px;font-size:12px;
  cursor:pointer;font-family:inherit;
  -webkit-tap-highlight-color:transparent;
}
.sc-mk-btn.active{color:#dcb35c;border-color:#dcb35c}

/* ── Time control ── */
#time-bar{
  display:flex;align-items:center;gap:3px;
  padding:4px 10px;border-bottom:1px solid #333331;
  flex-shrink:0;overflow-x:auto;scrollbar-width:none;
}
#time-bar::-webkit-scrollbar{display:none}
.tcb{
  background:transparent;color:#555;
  border:1px solid transparent;border-radius:3px;
  padding:3px 6px;font-size:10.5px;
  cursor:pointer;outline:none;font-family:inherit;
  white-space:nowrap;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.tcb.active{color:#dcb35c;border-color:#dcb35c}
.tc-sep{width:1px;background:#2a2a28;height:14px;flex-shrink:0;margin:0 3px}

/* ── Clock display ── */
#clock-bar{
  display:none;
  padding:6px 14px;border-bottom:1px solid #333331;
  justify-content:space-between;align-items:center;
  flex-shrink:0;
}
#clock-bar.visible{display:flex}
.ck-player{display:flex;align-items:center;gap:6px}
.ck-stone{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ck-stone-b{background:radial-gradient(circle at 35% 35%,#666,#111)}
.ck-stone-w{background:radial-gradient(circle at 35% 35%,#fff,#bbb);box-shadow:0 0 0 .5px #888}
.ck-main{
  font-size:19px;font-variant-numeric:tabular-nums;
  color:#3a3a38;font-weight:300;
  transition:color .25s;
}
.ck-byo{font-size:11px;color:#555;font-variant-numeric:tabular-nums}
.ck-player.ck-on .ck-main{color:#dcb35c;font-weight:500}
.ck-player.ck-on .ck-byo{color:#dcb35c}
.ck-player.ck-low .ck-main{color:#c94444;font-weight:600}

/* ── Score block ── */
#score-section{
  padding:7px 14px 6px;border-bottom:1px solid #333331;
  flex-shrink:0;
}
#score-block{
  display:grid;grid-template-columns:1fr auto auto;
  gap:0;font-size:12px;
}
.sc-row{display:contents}
.sc-label{color:#6a6a68;padding:2px 0;align-self:center;font-size:11px}
.sc-head{color:#6a6a68;font-size:10px;text-align:center;padding:0 10px 3px 4px}
.sc-head-w{color:#6a6a68;font-size:10px;text-align:center;padding:0 0 3px}
.sc-b{color:#b0b0ac;text-align:center;padding:2px 10px 2px 4px}
.sc-w{color:#b0b0ac;text-align:center;padding:2px 0}
/* Сепаратор + виграшна підсвітка рядка "Разом" */
.sc-total .sc-label,.sc-total .sc-b,.sc-total .sc-w{
  border-top:1px solid #505050;
  padding-top:5px;margin-top:2px;
}
.sc-total .sc-label{color:#f0f0ec;font-size:12px;border-top:1px solid #383836;padding-top:5px}
.sc-total .sc-b,.sc-total .sc-w{color:#f0f0ec;font-weight:600;border-top:1px solid #383836;padding-top:5px}
#sc-total-b.sc-win,#sc-total-w.sc-win{color:#dcb35c}
.sc-total .sc-b.sc-win,.sc-total .sc-w.sc-win{
  color:#dcb35c;font-weight:700;font-size:13px;
}
.sc-winner{
  grid-column:1/-1;
  display:flex;margin-top:1px;
}
.sc-res-cell{
  flex:1;text-align:center;padding:3px 0 1px;
  font-size:13px;color:#3a3a38;
}
.sc-res-cell.sc-res-win{color:#dcb35c;font-weight:600}

/* ── History ── */
#history-wrap{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:7px 12px 8px;min-height:0;
  background:#c49a3a;
  scrollbar-width:thin;scrollbar-color:rgba(60,36,4,.4) transparent;
}
#history-wrap::-webkit-scrollbar{width:2px}
#history-wrap::-webkit-scrollbar-thumb{background:rgba(60,36,4,.4);border-radius:2px}

/* Flow layout — like text, wrapping to next line */
#history-list{
  display:flex;flex-wrap:wrap;gap:0 2px;
  align-content:flex-start;
}
.h-item{
  display:inline-flex;align-items:baseline;gap:2px;
  white-space:nowrap;margin-right:6px;margin-bottom:3px;
}
.h-num{color:rgba(60,36,4,.65);font-size:9px}
/* чорний хід — темний текст на жовтому */
.h-coord-b{color:#1a1008;font-size:12px;font-weight:600}
/* білий хід — світлий текст на жовтому */
.h-coord-w{color:#f0f0ec;font-size:12px;font-weight:600}
/* пас — рамка, без заливки */
.h-pass-item{
  display:inline-flex;align-items:center;
  font-size:10px;font-style:normal;
  border:1px solid #d4a84b;border-radius:3px;
  padding:0 4px;line-height:1.6;
  margin-right:6px;margin-bottom:3px;
}
.h-pass-b{color:#1a1008}
.h-pass-w{color:#f0f0ec}

/* ── Zen button ── */
#zen-btn{
  position:fixed;z-index:100;
  background:transparent;
  border:1px solid #333;border-radius:50%;
  width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#555;font-size:11px;
  transition:color .2s,border-color .2s;outline:none;
  bottom:calc(45vh + 8px);right:12px;
}
#root.landscape #zen-btn{bottom:12px;right:12px}
#root.zen #zen-btn{bottom:14px;right:14px;color:#333;border-color:#2a2a28}
#zen-btn:active{color:#dcb35c;border-color:#dcb35c}

/* ── Binary clock ── */
#bin-clock{
  display:flex;align-items:flex-end;justify-content:center;
  padding:6px 12px 5px;
  border-bottom:1px solid #333331;
  flex-shrink:0;gap:0;
}
.bc-group{display:flex;gap:0;align-items:flex-end}
.bc-col{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:2px}
.bc-bit{
  border-radius:50%;
  background:#3a3a38;
  flex-shrink:0;
}
.bc-bit.on{background:#dcb35c}
/* spacer між групами — ширина як у біта, висота 0 */
.bc-spacer{flex-shrink:0}

@media(max-height:600px){
  #info-panel{height:42vh;min-height:180px}
  #zen-btn:not(#root.landscape #zen-btn):not(#root.zen #zen-btn){bottom:calc(42vh + 6px)}
}
</style>
</head>
<body>
<div id="root">

  <div id="board-side">
    <div id="board-wrap">
      <canvas id="go-canvas"></canvas>
    </div>
  </div>

  <div id="info-panel">

    <!-- Size + komi — завжди вгорі, незмінно -->
    <div id="size-bar">
      <button class="size-btn active" data-size="9">9×9</button>
      <button class="size-btn" data-size="13">13×13</button>
      <button class="size-btn" data-size="19">19×19</button>
      <div id="komi-wrap">
        <span>Комі</span>
        <input id="komi-input" type="number" value="6.5" step="0.5" min="0" max="9">
      </div>
    </div>

    <!-- Time control presets: ∞ | Fischer | Byoyomi -->
    <div id="time-bar">
      <button class="tcb active" data-tc="none">∞</button>
      <div class="tc-sep"></div>
      <button class="tcb" data-tc="f1">2+7</button>
      <button class="tcb" data-tc="f2">5+10</button>
      <button class="tcb" data-tc="f3">10+30</button>
      <div class="tc-sep"></div>
      <button class="tcb" data-tc="b1">5×30</button>
      <button class="tcb" data-tc="b2">10×30</button>
      <button class="tcb" data-tc="b3">20×60</button>
    </div>

    <!-- Running clocks (visible only when timer active) -->
    <div id="clock-bar">
      <div class="ck-player" id="ck-b">
        <div class="ck-stone ck-stone-b"></div>
        <span class="ck-main" id="ck-main-b">—</span>
        <span class="ck-byo" id="ck-byo-b"></span>
      </div>
      <div class="ck-player" id="ck-w" style="flex-direction:row-reverse">
        <div class="ck-stone ck-stone-w"></div>
        <span class="ck-main" id="ck-main-w">—</span>
        <span class="ck-byo" id="ck-byo-w"></span>
      </div>
    </div>

    <!-- Score — завжди на місці -->
    <div id="score-section">
      <div id="score-block">
        <div class="sc-row">
          <div></div>
          <div class="sc-head">чорні</div>
          <div class="sc-head-w">білі</div>
        </div>
        <div class="sc-row">
          <div class="sc-label">Територія</div>
          <div class="sc-b" id="sc-terr-b">—</div>
          <div class="sc-w" id="sc-terr-w">—</div>
        </div>
        <div class="sc-row">
          <div class="sc-label">Захоплено</div>
          <div class="sc-b" id="sc-cap-b">0</div>
          <div class="sc-w" id="sc-cap-w">0</div>
        </div>
        <div class="sc-row">
          <div class="sc-label">Комі</div>
          <div class="sc-b">—</div>
          <div class="sc-w" id="sc-komi-val">6.5</div>
        </div>
        <div class="sc-row sc-total">
          <div class="sc-label">Разом</div>
          <div class="sc-b" id="sc-total-b">—</div>
          <div class="sc-w" id="sc-total-w">—</div>
        </div>
        <!-- Marking controls: в тій самій сітці → Ч/Б точно під колонками чорних/білих -->
        <div class="sc-row" id="sc-mark-ctrl" style="display:none">
          <div class="sc-mc-label">
            <button class="sc-mk-btn" id="mmb-neutral">⊘</button>
            <button class="ctrl-btn accent" id="finalize-btn">✓ Підрахувати</button>
          </div>
          <div class="sc-b sc-mc-cell"><button class="sc-mk-btn active" id="mmb-black">Ч</button></div>
          <div class="sc-w sc-mc-cell"><button class="sc-mk-btn" id="mmb-white">Б</button></div>
        </div>
        <!-- Back button: після фіналізації -->
        <div class="sc-row" id="sc-back-ctrl" style="display:none">
          <div class="sc-mc-back">
            <button class="ctrl-btn accent" id="back-btn">Редагувати</button>
          </div>
        </div>
        <div id="sc-winner" class="sc-winner" style="display:none">
          <div class="sc-res-cell" id="sc-res-b-cell"><span id="sc-res-b">—</span></div>
          <div class="sc-res-cell" id="sc-res-w-cell"><span id="sc-res-w">—</span></div>
        </div>
      </div>
    </div>

    <!-- Controls — після рахунку, перед history -->
    <div id="ctrl-bar">
      <button class="ctrl-btn" id="pass-btn">Пас</button>
    </div>

    <!-- Binary clock — між score і history -->
    <div id="bin-clock" role="timer" aria-label="Бінарний годинник"></div>

    <!-- History -->
    <div id="history-wrap">
      <div id="history-list"></div>
    </div>

  </div>

</div>

<button id="zen-btn" title="Дзен">▶</button>

<script>
'use strict';

const EMPTY=0,BLACK=1,WHITE=2,NEUTRAL=3;
const LETTERS='ABCDEFGHJKLMNOPQRST'.split('');
const STAR={
  9:[[2,2],[2,6],[4,4],[6,2],[6,6]],
  13:[[3,3],[3,9],[6,6],[9,3],[9,9]],
  19:[[3,3],[3,9],[3,15],[9,3],[9,9],[9,15],[15,3],[15,9],[15,15]]
};
const DX=[-1,1,0,0],DY=[0,0,-1,1]; // BFS neighbor directions

let SIZE=9,KOMI=6.5;
let board,turn,koHash,captures,history,passCount,gameOver,lastMove;
let markingMode=false,territoryMap;
let deadStones=null;       // Uint8Array: 1 = група позначена як мертва
let manualMarks=null;      // Uint8Array: BLACK/WHITE/NEUTRAL = ручне маркування, 0 = авто
let markTerritoryMode=BLACK; // поточний режим ручного маркування
let cachedAutoTerritory=null; // перераховується при зміні deadStones
let pad=0,cell=0,cxArr=[],cyArr=[];
let hoverX=-1,hoverY=-1,zenMode=false;
let _cachedRect=null;
let histRenderedCount=0,histMoveCount=0;

const bgCanvas=document.createElement('canvas');
const bgCtx=bgCanvas.getContext('2d',{alpha:false});
// Stone bitmap cache — rebuilt on resize, used via drawImage() in draw()
const stoneCache={b:null,w:null,D:0,cR:0};
const canvas=document.getElementById('go-canvas');
const ctx=canvas.getContext('2d',{alpha:false,desynchronized:true});
const root=document.getElementById('root');
const boardSide=document.getElementById('board-side');
const infoPanel=document.getElementById('info-panel');
const zenBtn=document.getElementById('zen-btn');
const passBtnEl=document.getElementById('pass-btn');
const finalizeBtn=document.getElementById('finalize-btn');
const backBtn=document.getElementById('back-btn');
const scMarkCtrl=document.getElementById('sc-mark-ctrl');
const scBackCtrl=document.getElementById('sc-back-ctrl');
const ctrlBar=document.getElementById('ctrl-bar');
const mmbBlack=document.getElementById('mmb-black');
const mmbWhite=document.getElementById('mmb-white');
const mmbNeutral=document.getElementById('mmb-neutral');
const histList=document.getElementById('history-list');
const histWrap=document.getElementById('history-wrap');
const komiInput=document.getElementById('komi-input');
const scTerrB=document.getElementById('sc-terr-b');
const scTerrW=document.getElementById('sc-terr-w');
const scCapB=document.getElementById('sc-cap-b');
const scCapW=document.getElementById('sc-cap-w');
const scKomiVal=document.getElementById('sc-komi-val');
const scTotalB=document.getElementById('sc-total-b');
const scTotalW=document.getElementById('sc-total-w');
const scWinner=document.getElementById('sc-winner');
const scResB=document.getElementById('sc-res-b');
const scResW=document.getElementById('sc-res-w');
const scResBCell=document.getElementById('sc-res-b-cell');
const scResWCell=document.getElementById('sc-res-w-cell');
const clockBar=document.getElementById('clock-bar');
const ckB=document.getElementById('ck-b');
const ckW=document.getElementById('ck-w');
const ckMainB=document.getElementById('ck-main-b');
const ckMainW=document.getElementById('ck-main-w');
const ckByoB=document.getElementById('ck-byo-b');
const ckByoW=document.getElementById('ck-byo-w');

/* ── Audio ── */
let audioCtx=null;
function playClick(){
  try{
    if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.frequency.value=820;o.type='sine';
    g.gain.setValueAtTime(.15,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.07);
    o.start();o.stop(audioCtx.currentTime+.07);
  }catch(e){}
}

/* ── Zobrist ── */
let ZH=null,zhHi=0,zhLo=0;
function initZobrist(){
  ZH=[[],[]];
  for(let c=0;c<2;c++)
    for(let i=0;i<SIZE*SIZE;i++)
      ZH[c][i]=[Math.random()*0x100000|0,Math.random()*0x100000|0];
  zhHi=0;zhLo=0;
}
function zKey(){return zhHi+'|'+zhLo}
function zToggle(x,y,c){const i=y*SIZE+x,ci=c-1;zhHi^=ZH[ci][i][0];zhLo^=ZH[ci][i][1];}

/* ── Orientation ── */
function applyOrientation(){
  const ls=window.innerWidth>window.innerHeight;
  root.classList.toggle('landscape',ls&&!zenMode);
  if(zenMode){
    zenBtn.style.cssText='bottom:14px;right:14px';
  } else if(ls){
    zenBtn.style.cssText='bottom:12px;right:12px';
  } else {
    const ph=infoPanel.offsetHeight||Math.round(window.innerHeight*0.45);
    zenBtn.style.cssText=`bottom:${ph+8}px;right:12px`;
  }
}

/* ── Timer presets ── */
const TC={
  none:{type:'none'},
  f1:{type:'f',main:120,inc:7},     // 2' + 7" Fischer
  f2:{type:'f',main:300,inc:10},    // 5' + 10"
  f3:{type:'f',main:600,inc:30},    // 10' + 30"
  b1:{type:'b',main:300,periods:5,period:30},  // 5' + 5×30" Byoyomi
  b2:{type:'b',main:600,periods:5,period:30},  // 10' + 5×30"
  b3:{type:'b',main:1200,periods:5,period:60}, // 20' + 5×60"
};
let tcKey='none',timerInt=null,timerStarted=false;
let clockB={},clockW={};

function makeClk(pre){
  return pre.type==='none'?{}:
    {main:pre.main,inByo:false,periods:pre.periods||0,byoT:pre.period||0};
}
function fmtSec(s){
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}
function updateClockUI(){
  const pre=TC[tcKey];if(pre.type==='none')return;
  const isByoyomi=pre.type==='b';
  // Black
  ckMainB.textContent=clockB.inByo?`0:${String(clockB.byoT).padStart(2,'0')}`:fmtSec(clockB.main);
  ckByoB.textContent=isByoyomi?`×${clockB.periods}`:'';
  // White
  ckMainW.textContent=clockW.inByo?`0:${String(clockW.byoT).padStart(2,'0')}`:fmtSec(clockW.main);
  ckByoW.textContent=isByoyomi?`×${clockW.periods}`:'';
  // Active / low
  const bOn=timerStarted&&!gameOver&&!markingMode&&turn===BLACK;
  const wOn=timerStarted&&!gameOver&&!markingMode&&turn===WHITE;
  const bLow=bOn&&(clockB.inByo?clockB.byoT<=10:clockB.main<=30);
  const wLow=wOn&&(clockW.inByo?clockW.byoT<=10:clockW.main<=30);
  ckB.classList.toggle('ck-on',bOn&&!bLow);
  ckW.classList.toggle('ck-on',wOn&&!wLow);
  ckB.classList.toggle('ck-low',bLow);
  ckW.classList.toggle('ck-low',wLow);
}
function timerTick(){
  if(gameOver||markingMode){clearInterval(timerInt);timerInt=null;return;}
  const p=turn===BLACK?clockB:clockW;
  const pre=TC[tcKey];
  if(pre.type==='f'){
    if(--p.main<=0){p.main=0;updateClockUI();onTimeExpired();return;}
  } else {
    if(!p.inByo){
      if(--p.main<=0){p.main=0;p.inByo=true;p.byoT=pre.period;}
    } else {
      if(--p.byoT<=0){
        if(--p.periods<=0){p.byoT=0;updateClockUI();onTimeExpired();return;}
        p.byoT=pre.period;
      }
    }
  }
  updateClockUI();
}
function onMoveMade(movedBy){
  // викликається ДО перемикання turn — movedBy = гравець, що зробив хід
  const pre=TC[tcKey];if(pre.type==='none')return;
  const p=movedBy===BLACK?clockB:clockW;
  if(pre.type==='f'){p.main+=pre.inc;}          // Фішер: +інкремент
  else if(p.inByo){p.byoT=pre.period;}          // Бьо-йомі: скинути таймер періоду
  if(!timerStarted){
    timerStarted=true;
    timerInt=setInterval(timerTick,1000);
  }
}
function onTimeExpired(){
  clearInterval(timerInt);timerInt=null;
  gameOver=true;passBtnEl.disabled=true;
  const won=turn===BLACK?WHITE:BLACK;
  scResB.textContent=won===BLACK?'✓':'×';
  scResW.textContent=won===WHITE?'✓':'×';
  scResBCell.classList.toggle('sc-res-win',won===BLACK);
  scResWCell.classList.toggle('sc-res-win',won===WHITE);
  scWinner.style.display='';
  scBackCtrl.style.display='contents';
  updateClockUI();draw();
}
function setupTimer(){
  clearInterval(timerInt);timerInt=null;timerStarted=false;
  const pre=TC[tcKey];
  if(pre.type==='none'){clockBar.classList.remove('visible');return;}
  clockB=makeClk(pre);clockW=makeClk(pre);
  clockBar.classList.add('visible');
  updateClockUI();
}

/* ── Init ── */
function init(){
  board=new Uint8Array(SIZE*SIZE);
  turn=BLACK;koHash=null;
  captures={[BLACK]:0,[WHITE]:0};
  history=[];passCount=0;gameOver=false;lastMove=null;
  markingMode=false;
  deadStones=null;manualMarks=null;markTerritoryMode=BLACK;
  territoryMap=null;hoverX=-1;hoverY=-1;
  cachedAutoTerritory=null;
  initZobrist();
  resetPhaseUI();
  passBtnEl.disabled=false;
  setupTimer();
  updateScoreDisplay();
  renderHistory();
  resizeCanvas();
}

function resetPhaseUI(){
  passBtnEl.style.display='';
  ctrlBar.style.display='';
  scMarkCtrl.style.display='none';
  scBackCtrl.style.display='none';
  scWinner.style.display='none';
  scTotalB.classList.remove('sc-win');scTotalW.classList.remove('sc-win');
}

/* ── Resize ── */
let _rt=null;
function resizeCanvas(){
  clearTimeout(_rt);
  _rt=setTimeout(()=>{
    const sr=boardSide.getBoundingClientRect();
    const dpr=window.devicePixelRatio||1;
    // square: fit in available space with padding already applied via CSS
    const S=Math.floor(Math.min(sr.width,sr.height));
    if(S<60)return;
    canvas.width=S*dpr;canvas.height=S*dpr;
    canvas.style.width=S+'px';canvas.style.height=S+'px';

    // zen: larger margin so edge stones never clip outside board area
    // detail: coords need space, same margin works for both label + stone safety
    pad=Math.round(S*dpr*(zenMode?0.075:0.058));
    cell=(S*dpr-2*pad)/(SIZE-1);
    cxArr=Array.from({length:SIZE},(_,i)=>pad+i*cell);
    cyArr=Array.from({length:SIZE},(_,i)=>pad+i*cell);

    _cachedRect=null;
    rebuildStoneCache();
    bgCanvas.width=S*dpr;bgCanvas.height=S*dpr;
    drawBG();draw();
  },80);
}

/* ── Draw BG ── */
function drawBG(){
  const W=bgCanvas.width;
  bgCtx.fillStyle='#d4a84b';
  const r=Math.max(4,W*0.012);
  bgCtx.beginPath();
  bgCtx.roundRect(0,0,W,W,r);
  bgCtx.fill();

  // grid
  bgCtx.strokeStyle='#4a3206';
  bgCtx.lineWidth=Math.max(.8,cell*.02);
  bgCtx.beginPath();
  for(let i=0;i<SIZE;i++){
    bgCtx.moveTo(cxArr[i],cyArr[0]);bgCtx.lineTo(cxArr[i],cyArr[SIZE-1]);
    bgCtx.moveTo(cxArr[0],cyArr[i]);bgCtx.lineTo(cxArr[SIZE-1],cyArr[i]);
  }
  bgCtx.stroke();

  // star points
  bgCtx.fillStyle='#4a3206';
  for(const[sx,sy]of(STAR[SIZE]||[])){
    bgCtx.beginPath();
    bgCtx.arc(cxArr[sx],cyArr[sy],cell*.095,0,Math.PI*2);
    bgCtx.fill();
  }

  // coords (detail mode only)
  if(!zenMode){
    const fs=Math.max(7,cell*.17);
    bgCtx.font=`${fs}px -apple-system,Arial,sans-serif`;
    bgCtx.fillStyle='rgba(60,36,4,.65)';
    bgCtx.textAlign='center';bgCtx.textBaseline='middle';
    for(let i=0;i<SIZE;i++){
      bgCtx.fillText(LETTERS[i],cxArr[i],pad*.45);
      bgCtx.fillText(LETTERS[i],cxArr[i],W-pad*.45);
      bgCtx.fillText(SIZE-i,pad*.45,cyArr[i]);
      bgCtx.fillText(SIZE-i,W-pad*.45,cyArr[i]);
    }
  }
}

/* ── Draw dynamic ── */
let _drawRaf=null;
function draw(){
  if(_drawRaf)return; // вже заплановано на цей кадр
  _drawRaf=requestAnimationFrame(()=>{
    _drawRaf=null;
    // drawImage(bgCanvas) повністю перекриває canvas
    ctx.drawImage(bgCanvas,0,0);

    const r=cell*.46;

    // territory preview під час маркування
    if(markingMode&&cachedAutoTerritory){
      for(let y=0;y<SIZE;y++)
        for(let x=0;x<SIZE;x++){
          const i=y*SIZE+x;
          const isVirtEmpty=board[i]===EMPTY||(deadStones&&deadStones[i]);
          if(!isVirtEmpty)continue;
          const mm=manualMarks?manualMarks[i]:0;
          if(mm===NEUTRAL){
            // спірна: сірий ×
            const cx=cxArr[x],cy=cyArr[y],s=r*.28;
            ctx.strokeStyle='#666';ctx.lineWidth=Math.max(1.5,cell*.04);
            ctx.beginPath();ctx.moveTo(cx-s,cy-s);ctx.lineTo(cx+s,cy+s);
            ctx.moveTo(cx+s,cy-s);ctx.lineTo(cx-s,cy+s);ctx.stroke();
          } else if(mm===BLACK||mm===WHITE){
            // ручна позначка: суцільна кулька
            ctx.beginPath();ctx.arc(cxArr[x],cyArr[y],r*.36,0,Math.PI*2);
            ctx.fillStyle=mm===BLACK?'#1a1a1a':'#f0f0ec';ctx.fill();
          } else if(cachedAutoTerritory[i]){
            // авто-територія: напівпрозора
            ctx.globalAlpha=.2;
            drawStone(cxArr[x],cyArr[y],r*.65,cachedAutoTerritory[i]);
            ctx.globalAlpha=1;
          }
        }
    }

    // фінальні позначки після підрахунку (B/W крапки + спірні ×)
    if(gameOver&&territoryMap){
      for(let y=0;y<SIZE;y++)
        for(let x=0;x<SIZE;x++){
          const i=y*SIZE+x;
          const isVirtEmpty=board[i]===EMPTY||(deadStones&&deadStones[i]);
          if(!isVirtEmpty)continue;
          if(manualMarks&&manualMarks[i]===NEUTRAL){
            const cx=cxArr[x],cy=cyArr[y],s=r*.28;
            ctx.strokeStyle='#555';ctx.lineWidth=Math.max(1.5,cell*.04);
            ctx.beginPath();ctx.moveTo(cx-s,cy-s);ctx.lineTo(cx+s,cy+s);
            ctx.moveTo(cx+s,cy-s);ctx.lineTo(cx-s,cy+s);ctx.stroke();
          } else if(territoryMap[i]){
            ctx.beginPath();
            ctx.arc(cxArr[x],cyArr[y],r*.34,0,Math.PI*2);
            ctx.fillStyle=territoryMap[i]===BLACK?'#1a1a1a':'#f0f0ec';
            ctx.fill();
          }
        }
    }

    // stones (мертві — напівпрозорі)
    for(let y=0;y<SIZE;y++)
      for(let x=0;x<SIZE;x++){
        const i=y*SIZE+x;
        if(board[i]===EMPTY)continue;
        if(deadStones&&deadStones[i]){
          ctx.globalAlpha=.3;
          drawStone(cxArr[x],cyArr[y],r,board[i]);
          ctx.globalAlpha=1;
        } else {
          drawStone(cxArr[x],cyArr[y],r,board[i]);
        }
      }

    // last move marker
    if(lastMove){
      const[lx,ly]=lastMove;
      const c=board[ly*SIZE+lx];
      ctx.beginPath();
      ctx.arc(cxArr[lx],cyArr[ly],r*.36,0,Math.PI*2);
      ctx.strokeStyle=c===BLACK?'#dcb35c':'#555';
      ctx.lineWidth=Math.max(1,cell*.048);
      ctx.stroke();
    }

    // hover ghost
    if(!gameOver&&!markingMode&&hoverX>=0&&board[hoverY*SIZE+hoverX]===EMPTY){
      ctx.globalAlpha=.28;
      drawStone(cxArr[hoverX],cyArr[hoverY],r,turn);
      ctx.globalAlpha=1;
    }
  });
}

/* ── Stone bitmap cache ── */
function rebuildStoneCache(){
  const r=cell*.46;
  const rb=r*1.06; // black: slightly larger
  const margin=rb*1.2; // reduced: smaller shadow needs less canvas buffer
  const D=Math.ceil(rb*2+margin*2);
  const half=D/2;
  function bake(radius,isBlack){
    const oc=document.createElement('canvas');
    oc.width=D;oc.height=D;
    const ox=oc.getContext('2d',{alpha:true});
    ox.shadowColor='rgba(0,0,0,.5)';
    ox.shadowBlur=radius*.35;
    ox.shadowOffsetX=radius*.05;ox.shadowOffsetY=radius*.08;
    ox.beginPath();ox.arc(half,half,radius,0,Math.PI*2);
    if(isBlack){
      const g=ox.createRadialGradient(half-radius*.28,half-radius*.32,radius*.04,half,half,radius);
      g.addColorStop(0,'#707070');g.addColorStop(.38,'#2e2e2e');g.addColorStop(1,'#0c0c0c');
      ox.fillStyle=g;
    } else {
      const g=ox.createRadialGradient(half-radius*.28,half-radius*.32,radius*.04,half,half,radius);
      g.addColorStop(0,'#ffffff');g.addColorStop(.45,'#e8e8e4');g.addColorStop(1,'#b4b4b0');
      ox.fillStyle=g;
    }
    ox.fill();
    ox.shadowColor='transparent';
    ox.beginPath();ox.arc(half-radius*.26,half-radius*.27,radius*.15,0,Math.PI*2);
    ox.fillStyle=isBlack?'rgba(255,255,255,.2)':'rgba(255,255,255,.72)';
    ox.fill();
    return oc;
  }
  stoneCache.b=bake(rb,true);
  stoneCache.w=bake(r,false);
  stoneCache.D=D;stoneCache.cR=rb;
}

function drawStone(cx,cy,r,color){
  // Use pre-rendered bitmap when radius matches cached size (normal gameplay + hover)
  const expectedR=color===BLACK?stoneCache.cR:cell*.46;
  if(stoneCache.b&&Math.abs(r-expectedR)<1){
    const D=stoneCache.D;
    ctx.drawImage(color===BLACK?stoneCache.b:stoneCache.w,
      Math.round(cx-D/2),Math.round(cy-D/2),D,D);
    return;
  }
  // Direct fallback: ghost/marking stones at different radius
  const rr=color===BLACK?r*1.06:r;
  ctx.shadowColor='rgba(0,0,0,.5)';
  ctx.shadowBlur=rr*.35;ctx.shadowOffsetX=rr*.05;ctx.shadowOffsetY=rr*.08;
  ctx.beginPath();ctx.arc(cx,cy,rr,0,Math.PI*2);
  if(color===BLACK){
    const g=ctx.createRadialGradient(cx-rr*.28,cy-rr*.32,rr*.04,cx,cy,rr);
    g.addColorStop(0,'#707070');g.addColorStop(.38,'#2e2e2e');g.addColorStop(1,'#0c0c0c');
    ctx.fillStyle=g;
  } else {
    const g=ctx.createRadialGradient(cx-rr*.28,cy-rr*.32,rr*.04,cx,cy,rr);
    g.addColorStop(0,'#fff');g.addColorStop(.45,'#e8e8e4');g.addColorStop(1,'#b4b4b0');
    ctx.fillStyle=g;
  }
  ctx.fill();
  // явно скидаємо тінь — без save/restore
  ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;
  ctx.beginPath();ctx.arc(cx-rr*.26,cy-rr*.27,rr*.15,0,Math.PI*2);
  ctx.fillStyle=color===BLACK?'rgba(255,255,255,.2)':'rgba(255,255,255,.72)';
  ctx.fill();
}

/* ── Input ── */
function canvasXY(e){
  if(!_cachedRect)_cachedRect=canvas.getBoundingClientRect();
  const rect=_cachedRect;
  const dpr=window.devicePixelRatio||1;
  const px=(e.clientX-rect.left)*dpr;
  const py=(e.clientY-rect.top)*dpr;
  let x=Math.round((px-pad)/cell);
  let y=Math.round((py-pad)/cell);
  x=Math.max(0,Math.min(SIZE-1,x));
  y=Math.max(0,Math.min(SIZE-1,y));
  const dx=px-cxArr[x],dy=py-cyArr[y];
  if(dx*dx+dy*dy>(cell*.6)*(cell*.6))return{x:-1,y:-1};
  return{x,y};
}

canvas.addEventListener('pointermove',e=>{
  if(gameOver||markingMode)return;
  const{x,y}=canvasXY(e);
  if(x<0){if(hoverX>=0){hoverX=-1;draw();}return;}
  if(x!==hoverX||y!==hoverY){hoverX=x;hoverY=y;draw();}
});
canvas.addEventListener('pointerleave',()=>{if(hoverX>=0){hoverX=-1;hoverY=-1;draw();}});
canvas.addEventListener('pointerdown',e=>{
  const{x,y}=canvasXY(e);if(x<0)return;
  requestAnimationFrame(()=>{
    if(markingMode){
      if(board[y*SIZE+x]!==EMPTY){
        // камінь → перемикаємо всю групу як мертву/живу
        const vis=new Uint8Array(SIZE*SIZE);
        const{group}=groupInfo(board,x,y,board[y*SIZE+x],vis);
        const wasDead=deadStones[y*SIZE+x]===1;
        for(const[gx,gy]of group)deadStones[gy*SIZE+gx]=wasDead?0:1;
        cachedAutoTerritory=computeAutoTerritory();
      } else {
        // порожня клітина → ручне маркування (BLACK / WHITE / NEUTRAL)
        const i=y*SIZE+x;
        manualMarks[i]=manualMarks[i]===markTerritoryMode?0:markTerritoryMode;
      }
      draw();updateScoreDisplay();
    } else {
      if(gameOver||board[y*SIZE+x]!==EMPTY)return;
      playMove(x,y);
    }
  });
});

/* ── Game logic ── */
function playMove(x,y){
  const tb=board.slice(); // плоска копія — один виклик замість map+Uint8Array
  const ph=zhHi,pl=zhLo;
  tb[y*SIZE+x]=turn;zToggle(x,y,turn);
  const removed=removeCaptured(tb,3-turn);
  if(!hasLiberty(tb,x,y,turn)&&removed.length===0){zhHi=ph;zhLo=pl;return;}
  const newKey=zKey();
  if(koHash&&koHash===newKey){zhHi=ph;zhLo=pl;return;}
  const prevKey=ph+'|'+pl;
  board=tb;lastMove=[x,y];
  captures[turn]+=removed.length;
  history.push({notation:LETTERS[x]+(SIZE-y),color:turn});
  koHash=removed.length===1?prevKey:null;
  passCount=0;onMoveMade(turn);turn=3-turn;
  playClick();
  updateScoreDisplay();renderHistory();draw();
}

function groupInfo(bd,x,y,color,vis){
  const group=[],queue=[y*SIZE+x];let alive=false;
  while(queue.length){
    const idx=queue.pop();if(vis[idx])continue;vis[idx]=1;
    const cx=idx%SIZE,cy=(idx-cx)/SIZE;group.push([cx,cy]);
    for(let d=0;d<4;d++){
      const nx=cx+DX[d],ny=cy+DY[d];
      if(nx<0||nx>=SIZE||ny<0||ny>=SIZE)continue;
      if(bd[ny*SIZE+nx]===EMPTY)alive=true;
      else if(bd[ny*SIZE+nx]===color&&!vis[ny*SIZE+nx])queue.push(ny*SIZE+nx);
    }
  }
  return{alive,group};
}
function removeCaptured(bd,color){
  const removed=[],vis=new Uint8Array(SIZE*SIZE);
  for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++){
    const idx=y*SIZE+x;
    if(bd[idx]===color&&!vis[idx]){
      const{alive,group}=groupInfo(bd,x,y,color,vis);
      if(!alive)for(const[gx,gy]of group){bd[gy*SIZE+gx]=EMPTY;zToggle(gx,gy,color);removed.push([gx,gy]);}
    }
  }
  return removed;
}
// Рання зупинка на першій знайденій свободі — не будує повний масив групи
function hasLiberty(bd,x,y,color){
  const vis=new Uint8Array(SIZE*SIZE);
  const queue=[y*SIZE+x];
  while(queue.length){
    const idx=queue.pop();if(vis[idx])continue;vis[idx]=1;
    const cx=idx%SIZE,cy=(idx-cx)/SIZE;
    for(let d=0;d<4;d++){
      const nx=cx+DX[d],ny=cy+DY[d];
      if(nx<0||nx>=SIZE||ny<0||ny>=SIZE)continue;
      if(bd[ny*SIZE+nx]===EMPTY)return true; // перша свобода — виходимо
      if(bd[ny*SIZE+nx]===color&&!vis[ny*SIZE+nx])queue.push(ny*SIZE+nx);
    }
  }
  return false;
}

/* ── Territory ── */

// Дошка без мертвих каменів — основа для підрахунку
function buildVirtualBoard(){
  if(!deadStones)return board;
  const vb=board.slice();
  for(let i=0;i<SIZE*SIZE;i++)if(deadStones[i])vb[i]=EMPTY;
  return vb;
}

// Автоматичне визначення territory — працює на virtualBoard
function computeAutoTerritory(){
  const bd=buildVirtualBoard();
  const terr=new Uint8Array(SIZE*SIZE);
  const vis=new Uint8Array(SIZE*SIZE);
  for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++){
    const idx=y*SIZE+x;
    if(bd[idx]===EMPTY&&!vis[idx]){
      const area=[],owners=new Set(),q=[idx];
      while(q.length){
        const i=q.pop();if(vis[i])continue;vis[i]=1;
        const cx=i%SIZE,cy=(i-cx)/SIZE;area.push(i);
        for(let d=0;d<4;d++){
          const nx=cx+DX[d],ny=cy+DY[d];
          if(nx<0||nx>=SIZE||ny<0||ny>=SIZE)continue;
          const ni=ny*SIZE+nx;
          if(bd[ni]===EMPTY){if(!vis[ni])q.push(ni);}
          else owners.add(bd[ni]);
        }
      }
      const owner=owners.size===1?owners.values().next().value:0;
      for(const i of area)terr[i]=owner;
    }
  }
  return terr;
}

// Фінальна карта territory: ручні позначки мають пріоритет над авто
function buildFinalMap(auto){
  const m=new Uint8Array(SIZE*SIZE);
  for(let i=0;i<SIZE*SIZE;i++){
    const isVirtualEmpty=board[i]===EMPTY||(deadStones&&deadStones[i]);
    if(!isVirtualEmpty)continue;
    if(manualMarks&&manualMarks[i]){
      // NEUTRAL(3) → 0: спірна не рахується нікому
      m[i]=manualMarks[i]===NEUTRAL?0:manualMarks[i];
    } else {
      m[i]=auto[i]||0;
    }
  }
  return m;
}

// Підрахунок: мертві камені = захоплені суперником
function calcScore(fm){
  let tb=0,tw=0,deadB=0,deadW=0;
  for(let i=0;i<SIZE*SIZE;i++){
    if(deadStones&&deadStones[i]){
      if(board[i]===BLACK)deadB++;else if(board[i]===WHITE)deadW++;
    }
    if(fm[i]===BLACK)tb++;else if(fm[i]===WHITE)tw++;
  }
  const capB=captures[BLACK]+deadW;
  const capW=captures[WHITE]+deadB;
  return{terrB:tb,terrW:tw,capB,capW,
    totalB:tb+capB,totalW:tw+capW+KOMI};
}

/* ── Score display ── */
function updateScoreDisplay(){
  scKomiVal.textContent=KOMI;
  if(markingMode||gameOver){
    const auto=cachedAutoTerritory||computeAutoTerritory();
    const fm=buildFinalMap(auto);
    const sc=calcScore(fm);
    scTerrB.textContent=sc.terrB;scTerrW.textContent=sc.terrW;
    scCapB.textContent=sc.capB;scCapW.textContent=sc.capW;
    scTotalB.textContent=sc.totalB.toFixed(1);scTotalW.textContent=sc.totalW.toFixed(1);
  } else {
    scCapB.textContent=captures[BLACK];
    scCapW.textContent=captures[WHITE];
    scTerrB.textContent='—';scTerrW.textContent='—';
    scTotalB.textContent='—';scTotalW.textContent='—';
  }
}
function showFinalScore(){
  const auto=cachedAutoTerritory||computeAutoTerritory();
  cachedAutoTerritory=auto; // зберігаємо — потрібно при поверненні назад
  territoryMap=buildFinalMap(auto);
  const sc=calcScore(territoryMap);
  scTerrB.textContent=sc.terrB;scTerrW.textContent=sc.terrW;
  scCapB.textContent=sc.capB;scCapW.textContent=sc.capW;
  scKomiVal.textContent=KOMI;
  scTotalB.textContent=sc.totalB.toFixed(1);scTotalW.textContent=sc.totalW.toFixed(1);
  scTotalB.classList.remove('sc-win');scTotalW.classList.remove('sc-win');
  if(sc.totalB>sc.totalW)scTotalB.classList.add('sc-win');
  else if(sc.totalW>sc.totalB)scTotalW.classList.add('sc-win');
  gameOver=true;
  scBackCtrl.style.display='contents';
  draw();
}

/* ── History — incremental append, no full rebuild ── */
function renderHistory(){
  if(history.length===0){
    histList.innerHTML='';
    histRenderedCount=0;histMoveCount=0;
    return;
  }
  for(let i=histRenderedCount;i<history.length;i++){
    const h=history[i];
    if(h.notation){
      histMoveCount++;
      const item=document.createElement('span');
      item.className='h-item';
      const coordClass=h.color===BLACK?'h-coord-b':'h-coord-w';
      item.innerHTML=`<span class="h-num">${histMoveCount}.</span><span class="${coordClass}">${h.notation}</span>`;
      histList.appendChild(item);
    } else if(h.pass){
      const item=document.createElement('span');
      item.className='h-pass-item';
      const textClass=h.color===BLACK?'h-pass-b':'h-pass-w';
      item.innerHTML=`<span class="${textClass}">пас</span>`;
      histList.appendChild(item);
    }
  }
  histRenderedCount=history.length;
  histWrap.scrollTop=histWrap.scrollHeight;
}

/* ── Buttons ── */
passBtnEl.onclick=()=>{
  if(gameOver)return;
  history.push({pass:true,color:turn});
  passCount++;lastMove=null;koHash=null;
  if(passCount>=2){
    clearInterval(timerInt);timerInt=null;
    markingMode=true;
    deadStones=new Uint8Array(SIZE*SIZE);
    manualMarks=new Uint8Array(SIZE*SIZE);
    cachedAutoTerritory=computeAutoTerritory();
    passBtnEl.style.display='none';
    ctrlBar.style.display='none';
    scMarkCtrl.style.display='contents';
    setMarkMode(BLACK);
    updateScoreDisplay();draw();
    return;
  }
  onMoveMade(turn);turn=3-turn;updateScoreDisplay();renderHistory();draw();
};


// Перемикач режиму ручного маркування territory
function setMarkMode(mode){
  markTerritoryMode=mode;
  mmbBlack.classList.toggle('active',mode===BLACK);
  mmbWhite.classList.toggle('active',mode===WHITE);
  mmbNeutral.classList.toggle('active',mode===NEUTRAL);
}
mmbBlack.onclick=()=>setMarkMode(BLACK);
mmbWhite.onclick=()=>setMarkMode(WHITE);
mmbNeutral.onclick=()=>setMarkMode(NEUTRAL);

finalizeBtn.onclick=()=>{
  markingMode=false;
  scMarkCtrl.style.display='none';
  showFinalScore();
};

// Повернення з фазу підрахунку назад у маркування мертвих каменів
backBtn.onclick=()=>{
  if(!gameOver)return;
  gameOver=false;markingMode=true;
  territoryMap=null;
  cachedAutoTerritory=computeAutoTerritory();
  scMarkCtrl.style.display='contents';
  scBackCtrl.style.display='none';
  scWinner.style.display='none';
  scTotalB.classList.remove('sc-win');scTotalW.classList.remove('sc-win');
  scResBCell.classList.remove('sc-res-win');scResWCell.classList.remove('sc-res-win');
  passBtnEl.disabled=false;
  setMarkMode(markTerritoryMode);
  updateScoreDisplay();draw();
};

/* ── Time control & Size & Komi ── */
document.querySelectorAll('.tcb').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.tcb').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    tcKey=btn.dataset.tc;
    init();
  };
});
document.querySelectorAll('.size-btn').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    SIZE=parseInt(btn.dataset.size);
    init();
  };
});
komiInput.oninput=()=>{
  const v=parseFloat(komiInput.value);
  if(!isNaN(v)&&v>=0)KOMI=v;
  scKomiVal.textContent=isNaN(v)?'—':v;
  updateScoreDisplay();
};
komiInput.onblur=()=>{
  if(isNaN(parseFloat(komiInput.value))){komiInput.value=6.5;KOMI=6.5;}
};

/* ── Zen ── */
zenBtn.onclick=()=>{
  zenMode=!zenMode;
  root.classList.toggle('zen',zenMode);
  zenBtn.textContent=zenMode?'◀':'▶';
  zenMode?wakeLockRequest():wakeLockRelease();
  applyOrientation();
  resizeCanvas();
};

/* ── Wake Lock — активний лише в дзен-режимі ── */
let _wakeLock=null;
async function wakeLockRequest(){
  if(!('wakeLock' in navigator))return;
  try{
    if(_wakeLock)return;
    _wakeLock=await navigator.wakeLock.request('screen');
    _wakeLock.addEventListener('release',()=>{_wakeLock=null;});
  }catch(e){}
}
async function wakeLockRelease(){
  if(_wakeLock){try{await _wakeLock.release();}catch(e){}}_wakeLock=null;
}
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'){
    if(zenMode)wakeLockRequest();
    clockTick();
  }
});

/* ── Binary clock ── */
(function initBinClock(){
  const BIT_LENS=[2,4,3,4,3,4]; // H1,H2,M1,M2,S1,S2
  const el=document.getElementById('bin-clock');
  const bitRefs=[];
  const bitState=[];
  const spacerRefs=[];
  const groupRefs=[];
  let clockTimer=null;

  // Build DOM
  BIT_LENS.forEach((len,i)=>{
    const col=document.createElement('div');
    col.className='bc-col';
    const bits=[];
    for(let j=0;j<len;j++){
      const b=document.createElement('div');
      b.className='bc-bit';
      b.setAttribute('aria-hidden','true');
      col.appendChild(b);
      bits.push(b);
    }
    // wrap pairs into group
    if(i%2===0){
      const g=document.createElement('div');
      g.className='bc-group';
      g.appendChild(col);
      el.appendChild(g);
      groupRefs.push(g);
    } else {
      el.lastElementChild.appendChild(col);
      // spacer after each pair except last
      if(i<BIT_LENS.length-1){
        const sp=document.createElement('div');
        sp.className='bc-spacer';
        el.appendChild(sp);
        spacerRefs.push(sp);
      }
    }
    bitRefs[i]=bits;
    bitState[i]=Array(len).fill(null);
  });

  // Size bits dynamically based on panel width
  function sizeBits(){
    const panelW=el.offsetWidth||200;
    const groupGap=Math.floor(panelW/14);
    const bitSz=Math.floor((panelW-24-2*groupGap)/8);
    const sz=Math.max(6,Math.min(bitSz,20));
    const szPx=sz+'px';
    for(let i=0;i<BIT_LENS.length;i++)
      for(let j=0;j<bitRefs[i].length;j++){
        bitRefs[i][j].style.width=szPx;bitRefs[i][j].style.height=szPx;
      }
    const spW=groupGap+'px';
    for(let s=0;s<spacerRefs.length;s++) spacerRefs[s].style.width=spW;
    const gGap=Math.max(2,Math.floor(sz/4))+'px';
    for(let g=0;g<groupRefs.length;g++) groupRefs[g].style.gap=gGap;
  }

  function tick(){
    const now=new Date();
    const digits=[
      Math.floor(now.getHours()/10),now.getHours()%10,
      Math.floor(now.getMinutes()/10),now.getMinutes()%10,
      Math.floor(now.getSeconds()/10),now.getSeconds()%10
    ];
    digits.forEach((digit,i)=>{
      const len=BIT_LENS[i];
      for(let j=0;j<len;j++){
        const isOn=((digit>>(len-1-j))&1)===1;
        if(bitState[i][j]!==isOn){
          bitState[i][j]=isOn;
          bitRefs[i][j].className=isOn?'bc-bit on':'bc-bit';
        }
      }
    });
    clockTimer=setTimeout(tick,1000-(Date.now()%1000));
  }

  sizeBits();
  let _sbt=null;
  window.addEventListener('resize',()=>{clearTimeout(_sbt);_sbt=setTimeout(sizeBits,80);});
  window.clockTick=()=>{clearTimeout(clockTimer);tick();}; // resync: скасувати попередній таймер перед запуском
  requestAnimationFrame(tick);
})();

/* ── Resize & orientation ── */
let _ot=null;
const onResize=()=>{clearTimeout(_ot);_ot=setTimeout(()=>{applyOrientation();resizeCanvas();},80);};
window.addEventListener('resize',onResize);
window.addEventListener('orientationchange',()=>{clearTimeout(_ot);_ot=setTimeout(()=>{applyOrientation();resizeCanvas();},140);});

/* ── PWA ── */
// SW через blob: не підтримується у Firefox/Safari (порушує same-origin).
// iOS: встановлення через apple-mobile-web-app-capable meta-теги (без SW).
// Chrome/Edge: встановлення через manifest blob — працює.
(async()=>{
  try{
    const svg=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="12" fill="#1f1f1e"/><circle cx="32" cy="32" r="14" fill="#dcb35c"/><circle cx="32" cy="32" r="8" fill="#1f1f1e"/></svg>`;
    const svgURL=URL.createObjectURL(new Blob([svg],{type:'image/svg+xml'}));
    function toPng(url,s){return new Promise((res,rej)=>{const img=new Image();img.crossOrigin='anonymous';img.onload=()=>{const c=document.createElement('canvas');c.width=s;c.height=s;c.getContext('2d').drawImage(img,0,0,s,s);res(c.toDataURL('image/png'));};img.onerror=rej;img.src=url;});}
    const icons=[];
    for(const s of[192,512]){try{icons.push({src:await toPng(svgURL,s),sizes:`${s}x${s}`,type:'image/png'});}catch(e){}}
    try{document.getElementById('apple-touch').href=await toPng(svgURL,180);}catch(e){}
    document.getElementById('manifest-link').href=URL.createObjectURL(new Blob([JSON.stringify({name:'Ґо',short_name:'Ґо',start_url:location.pathname,display:'standalone',background_color:'#1f1f1e',theme_color:'#1f1f1e',icons})],{type:'application/json'}));
  }catch(e){}
})();

/* ── Start ── */
applyOrientation();
init();
</script>
